name: "Terraform AWS"
on:
  pull_request:
    branches: 
      - main
  push:
    paths:
      - 'feat/**'
      - 'fix/**'
      - 'wip/**'

permissions:
  id-token: write
  contents: read
  pull-requests: write
  security-events: write

env:
    AWS_REGION: us-east-1
    TF_VERSION: 1.13.4

jobs:
  security:
    name: IaC - Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Git Clone the Repo
        uses: actions/checkout@v4

      - name: tfsec
        uses: aquasecurity/tfsec-pr-commenter-action@v1.2.0
        with:
          working_directory: ''
          github_token: ${{ github.token }}
          tfsec_args: --force-all-dirs

  plan:
    name: IaC - Plan
    runs-on: ubuntu-latest
    needs: security
    defaults:
      run:
        shell: bash
        # Terraform files are in the terraform directory
        working-directory: ./terraform

    steps:
    - name: Git Clone the Repo
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502
      with:
        role-to-assume: arn:aws:iam::151482153576:role/Github_Repo_devsecops-tfsec
        role-session-name: deploy-infrastructure-session
        aws-region: ${{ env.AWS_REGION }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ env.TF_VERSION }}
        terraform_wrapper: false

    - name: Terraform init
      id: init
      run: terraform init -input=false

    - name: Terraform Validate
      id: validate
      run: terraform validate -no-color

    - name: Terraform Plan
      id: plan
      run: terraform plan -no-color -input=false -out=tfplan
      continue-on-error: true 

    - name: Upload Terraform Plan Artifact
      if: steps.plan.outcome == 'success'
      uses: actions/upload-artifact@v4
      with:
        name: tfplan-${{ github.sha }}
        path: tfplan
        retention-days: 5

    - name: Comment PR with Plan Results
      uses: actions/github-script@v7 
      if: github.event_name == 'pull_request'
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
            // Check if the Terraform plan was successful
            const planStatus = "${{ steps.plan.outcome }}" === "success"
              ? "✅ Plan succeeded"
              : "❌ Plan failed";

            // Create a message to ask for approval if the plan succeeded
            const approvalMessage = planStatus === "✅ Plan succeeded"
              ? "\n\n### ⚠️ Changes detected! Review the plan above. Changes will be applied automatically when merged to main."
              : "";

            // Build the full comment body
            const commentBody = [
              "## Terraform Plan Results",
              "",
              `#### Security Scan: ✅ Passed (tfsec)`,
              `#### Terraform Initialization: \`${{ steps.init.outcome }}\``,
              `#### Terraform Validation: \`${{ steps.validate.outcome }}\``,
              `#### Terraform Plan: ${planStatus}`,
              "",
              "Terraform plan was uploaded as an artifact.",
              `[View it in the Actions tab](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`,
              approvalMessage,
              "",
              `*Pusher: @${{ github.actor }}, Action: \`${{ github.event_name }}\`, Workflow: \`${{ github.workflow }}\`*`
            ].join("\n");

            // Post the comment to the pull request
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: commentBody
            });

  apply:
    name: IaC - Apply
    needs: plan
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        # Terraform files are in the terraform directory
        working-directory: ./terraform
    environment:
      name: terraform-prod

    steps:
    - name: Git Clone the Repo
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502
      with:
        role-to-assume: arn:aws:iam::151482153576:role/Github_Repo_devsecops-tfsec
        role-session-name: deploy-infrastructure-session
        aws-region: ${{ env.AWS_REGION }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ env.TF_VERSION }}
        terraform_wrapper: false

    - name: Download Terraform Plan Artifact
      uses: actions/download-artifact@v4
      with:
        name: tfplan-${{ github.sha }}

    - name: Terraform init
      run: terraform init -input=false

    - name: Terraform Apply
      id: apply
      run: terraform apply -input=false tfplan

    - name: Terraform Output
      if: steps.apply.outcome == 'success'
      run: terraform output -json